    <g transform="translate(23 62)">
      <path d="M0 0H281V105H0Z" fill="#fffdf7" stroke="#171713" stroke-width="3"/>
      <path d="M281 65L306 83L281 91Z" fill="#fffdf7" stroke="#171713" stroke-width="3" stroke-linejoin="round"/>
      <text x="15" y="25" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="9" font-weight="700" letter-spacing="1" fill="#4355e8">BINJAMIN SAYS</text>
      <text x="15" y="52" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" letter-spacing="-.5" fill="#171713">“THAT ISN'T GARBAGE.</text>
      <text x="15" y="77" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" letter-spacing="-.5" fill="#171713">THAT'S MIDDLE MANAGEMENT.”</text>
    </g>

