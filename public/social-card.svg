<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">NO CAN DO — Featuring Binjamin</title>
  <desc id="description">The AI trash can that will not take your crap.</desc>
  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#171713" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#171713"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f3efe7"/>
