    <text x="64" y="25" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" letter-spacing="-1.5" fill="#171713">NO CAN DO™</text>
    <text x="65" y="42" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="8" font-weight="700" letter-spacing="1" fill="#171713">FEATURING BINJAMIN, C.R.O.</text>
  </g>

  <g transform="translate(54 118)">
