    <text x="14" y="22" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="10" font-weight="700" letter-spacing="1" fill="#171713">DEPT. OF SECOND CHANCES</text>

    <text x="0" y="112" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="900" letter-spacing="-6" fill="#171713">THE AI TRASH CAN</text>
    <rect x="-2" y="132" width="562" height="80" fill="#c9ff4a" transform="rotate(-1 279 172)"/>
    <text x="0" y="200" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="900" letter-spacing="-6" fill="#171713">THAT WON'T TAKE</text>
    <text x="0" y="284" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="900" letter-spacing="-6" fill="#171713">YOUR CRAP.</text>

    <text x="2" y="344" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#171713">Present an object. Receive judgment.</text>
    <text x="2" y="372" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#171713">Lose the right to throw it away.</text>
    <text x="2" y="436" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#5e5c55">NO-CAN-DO.VERCEL.APP · EMOTIONALLY BINDING</text>
  </g>

  <g transform="translate(738 105)" filter="url(#shadow)">
