      <text x="38" y="35" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="9" font-weight="800" fill="#171713">100%</text>
      <text x="38" y="49" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="8" font-weight="800" fill="#171713">JUDGMENTAL</text>
