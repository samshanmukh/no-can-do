      <ellipse cx="85" cy="76" rx="19" ry="16" fill="#fffdf7" stroke="#171713" stroke-width="5"/>
      <ellipse cx="158" cy="76" rx="19" ry="16" fill="#fffdf7" stroke="#171713" stroke-width="5"/>
      <circle cx="88" cy="76" r="6" fill="#171713"/>
      <circle cx="155" cy="76" r="6" fill="#171713"/>
      <path d="M105 94H137" stroke="#171713" stroke-width="5"/>
      <path d="M70 121V256M121 121V262M172 121V256" stroke="#171713" stroke-opacity=".14" stroke-width="3"/>
      <rect x="66" y="167" width="110" height="69" fill="#c9ff4a" stroke="#171713" stroke-width="4"/>
      <text x="121" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="900" fill="#ff7048">♥</text>
      <text x="121" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="900" fill="#171713">BINJAMIN</text>
      <text x="121" y="225" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="5" font-weight="700" fill="#171713">SECOND CHANCES</text>
